<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UT123 Dispatch Priority Ranker</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚚</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   DISPATCH WIZARD — PREMIUM ENTERPRISE UI
   Light default + Dark mode toggle
   Netflix / Gmail 2026 / Instagram / WhatsApp inspired
   ═══════════════════════════════════════════════════════════════ */

/* ── Theme Variables ─────────────────────────────────────────── */
:root,
[data-theme="light"] {
  --bg-base: #f0f2f5;
  --bg-primary: #ffffff;
  --bg-secondary: #f8f9fb;
  --bg-tertiary: #eef0f4;
  --bg-hover: #e8eaef;
  --bg-input: #f4f5f7;
  --bg-input-focus: #ffffff;
  --border-primary: rgba(0,0,0,0.08);
  --border-secondary: rgba(0,0,0,0.05);
  --border-focus: rgba(99,102,241,0.5);
  --text-primary: #111827;
  --text-secondary: #4b5563;
  --text-tertiary: #9ca3af;
  --text-inverse: #ffffff;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.1);
  --shadow-glow: 0 0 20px rgba(99,102,241,0.15);
  --gradient-primary: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
  --gradient-accent: linear-gradient(135deg, #f59e0b 0%, #f97316 100%);
  --gradient-success: linear-gradient(135deg, #10b981 0%, #059669 100%);
  --gradient-danger: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
  --gradient-surface: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.7) 100%);
  --accent: #6366f1;
  --accent-light: rgba(99,102,241,0.08);
  --accent-med: rgba(99,102,241,0.15);
  --green: #10b981;
  --green-bg: rgba(16,185,129,0.08);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,0.06);
  --orange: #f59e0b;
  --orange-bg: rgba(245,158,11,0.08);
  --blue: #3b82f6;
  --blue-bg: rgba(59,130,246,0.08);
  --purple: #8b5cf6;
  --glass: rgba(255,255,255,0.7);
  --glass-border: rgba(255,255,255,0.3);
  --tier-a: #f59e0b;
  --tier-a-bg: rgba(245,158,11,0.1);
  --tier-b: #10b981;
  --tier-b-bg: rgba(16,185,129,0.1);
  --tier-c: #3b82f6;
  --tier-c-bg: rgba(59,130,246,0.1);
  --tier-d: #9ca3af;
  --tier-d-bg: rgba(156,163,175,0.1);
  --radius: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-full: 9999px;
  --theme-toggle-bg: var(--bg-tertiary);
  --theme-toggle-icon: "🌙";
}

[data-theme="dark"] {
  --bg-base: #0b0d12;
  --bg-primary: #141620;
  --bg-secondary: #1a1d2a;
  --bg-tertiary: #212436;
  --bg-hover: #282c42;
  --bg-input: #181b28;
  --bg-input-focus: #1e2235;
  --border-primary: rgba(255,255,255,0.08);
  --border-secondary: rgba(255,255,255,0.04);
  --border-focus: rgba(99,102,241,0.6);
  --text-primary: #f1f3f9;
  --text-secondary: #8b8fa8;
  --text-tertiary: #4f5370;
  --text-inverse: #000000;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.5);
  --shadow-glow: 0 0 30px rgba(99,102,241,0.2);
  --gradient-surface: linear-gradient(180deg, rgba(20,22,32,0.95) 0%, rgba(20,22,32,0.8) 100%);
  --accent-light: rgba(99,102,241,0.12);
  --accent-med: rgba(99,102,241,0.2);
  --green-bg: rgba(16,185,129,0.12);
  --red-bg: rgba(239,68,68,0.1);
  --orange-bg: rgba(245,158,11,0.12);
  --blue-bg: rgba(59,130,246,0.12);
  --glass: rgba(20,22,32,0.7);
  --glass-border: rgba(255,255,255,0.06);
  --tier-a-bg: rgba(245,158,11,0.15);
  --tier-b-bg: rgba(16,185,129,0.15);
  --tier-c-bg: rgba(59,130,246,0.15);
  --tier-d-bg: rgba(156,163,175,0.08);
  --theme-toggle-bg: var(--bg-tertiary);
  --theme-toggle-icon: "☀️";
}

/* ── Reset ───────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg-base);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background 0.3s, color 0.3s;
}

/* ── Animations ──────────────────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(99,102,241,0.3); }
  50% { box-shadow: 0 0 16px 4px rgba(99,102,241,0.15); }
}

@keyframes pulse-stale {
  0%,100% { opacity: 1; }
  50% { opacity: 0.5; }
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(-8px); }
  to { opacity: 1; transform: translateX(0); }
}

/* ── Header ──────────────────────────────────────────────────── */
.header {
  background: var(--bg-primary);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-primary);
  padding: 0 32px;
  height: 64px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-sm);
  transition: background 0.3s, border-color 0.3s;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-mark {
  width: 36px;
  height: 36px;
  background: var(--gradient-primary);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  box-shadow: 0 2px 8px rgba(99,102,241,0.3);
}

.logo-text {
  font-size: 17px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.02em;
}

.logo-text em {
  font-style: normal;
  color: var(--accent);
}

.logo-tag {
  background: var(--gradient-accent);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: var(--radius-full);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-status {
  font-size: 12px;
  color: var(--text-tertiary);
  font-weight: 500;
}

.theme-toggle {
  width: 40px;
  height: 40px;
  border-radius: var(--radius);
  background: var(--bg-tertiary);
  border: 1px solid var(--border-primary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
}

.theme-toggle:hover {
  background: var(--bg-hover);
  transform: scale(1.05);
}

/* ── Main ────────────────────────────────────────────────────── */
.main {
  max-width: 1680px;
  margin: 0 auto;
  padding: 28px 32px 80px;
}

/* ── Paste Zone Card ─────────────────────────────────────────── */
.paste-zone {
  background: var(--bg-primary);
  border: 1px solid var(--border-primary);
  border-radius: var(--radius-xl);
  padding: 28px;
  margin-bottom: 24px;
  box-shadow: var(--shadow-md);
  animation: fadeUp 0.4s ease;
  transition: background 0.3s, border-color 0.3s;
}

.paste-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-tertiary);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.paste-label-icon {
  width: 28px;
  height: 28px;
  background: var(--accent-light);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}

.paste-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border-primary);
}

textarea {
  width: 100%;
  background: var(--bg-input);
  border: 2px solid var(--border-primary);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-family: 'Inter', monospace;
  font-size: 12px;
  line-height: 1.7;
  padding: 16px 18px;
  resize: vertical;
  min-height: 140px;
  outline: none;
  transition: all 0.25s;
}

textarea:focus {
  border-color: var(--accent);
  background: var(--bg-input-focus);
  box-shadow: 0 0 0 4px var(--accent-light);
}

textarea::placeholder { color: var(--text-tertiary); }

.controls {
  display: flex;
  gap: 10px;
  margin-top: 18px;
  align-items: center;
  flex-wrap: wrap;
}

/* ── Buttons ─────────────────────────────────────────────────── */
.btn {
  background: var(--gradient-primary);
  color: #fff;
  border: none;
  padding: 11px 28px;
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.02em;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 2px 8px rgba(99,102,241,0.25);
}

.btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(99,102,241,0.35);
}

.btn:active { transform: translateY(0); }

.btn-clear {
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  border: 1px solid var(--border-primary);
  padding: 10px 18px;
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  font-size: 13px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.2s;
}

.btn-clear:hover { background: var(--bg-hover); color: var(--text-primary); }

.btn-export {
  background: var(--green-bg);
  color: var(--green);
  border: 1px solid rgba(16,185,129,0.2);
  padding: 10px 18px;
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 13px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.2s;
  margin-left: auto;
  display: none;
}

.btn-export:hover { background: rgba(16,185,129,0.15); border-color: var(--green); }

.parse-info {
  margin-left: auto;
  font-size: 12px;
  color: var(--text-tertiary);
  font-weight: 500;
}

/* ── Stats Bar ───────────────────────────────────────────────── */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 14px;
  margin-bottom: 24px;
  animation: fadeUp 0.5s ease 0.1s both;
}

.stat-item {
  background: var(--bg-primary);
  border: 1px solid var(--border-primary);
  border-radius: var(--radius-lg);
  padding: 20px;
  text-align: center;
  box-shadow: var(--shadow-sm);
  transition: all 0.25s;
}

.stat-item:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}

.stat-val {
  font-size: 26px;
  font-weight: 800;
  color: var(--text-primary);
  display: block;
  letter-spacing: -0.02em;
}

.stat-label {
  font-size: 10px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 600;
  margin-top: 4px;
  display: block;
}

/* ── Filter Row ──────────────────────────────────────────────── */
.filter-row {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  align-items: center;
  flex-wrap: wrap;
  animation: fadeUp 0.5s ease 0.15s both;
}

.filter-label {
  font-size: 12px;
  color: var(--text-tertiary);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-right: 4px;
}

.filter-btn {
  background: var(--bg-primary);
  border: 1px solid var(--border-primary);
  color: var(--text-secondary);
  padding: 7px 14px;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border-radius: var(--radius-full);
  transition: all 0.2s;
}

.filter-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

.filter-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  box-shadow: 0 2px 8px rgba(99,102,241,0.25);
}

.search-input {
  background: var(--bg-secondary);
  border: 1px solid var(--border-primary);
  color: var(--text-primary);
  padding: 7px 14px;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  outline: none;
  width: 220px;
  margin-left: auto;
  border-radius: var(--radius-full);
  transition: all 0.2s;
}

.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
.search-input::placeholder { color: var(--text-tertiary); }

/* ── Results ─────────────────────────────────────────────────── */
.results-wrap { display: none; }

.results-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
  animation: fadeUp 0.5s ease 0.2s both;
}

.results-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.01em;
}

.results-count {
  background: var(--gradient-primary);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: var(--radius-full);
}

/* ── Table ────────────────────────────────────────────────────── */
.table-wrap {
  overflow-x: auto;
  background: var(--bg-primary);
  border: 1px solid var(--border-primary);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-md);
  animation: fadeUp 0.5s ease 0.25s both;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

thead tr {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-primary);
}

th {
  padding: 14px 16px;
  text-align: left;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
  transition: color 0.15s;
}

th:hover { color: var(--text-primary); }
th.sort-asc::after { content: ' \2191'; color: var(--accent); }
th.sort-desc::after { content: ' \2193'; color: var(--accent); }

tbody tr {
  border-bottom: 1px solid var(--border-secondary);
  transition: background 0.15s;
}

tbody tr:hover { background: var(--bg-secondary); }
tbody tr:last-child { border-bottom: none; }

td {
  padding: 13px 16px;
  vertical-align: middle;
  white-space: nowrap;
}

.rank-cell {
  font-weight: 800;
  font-size: 15px;
  color: var(--text-tertiary);
  width: 44px;
}

.rank-1, .rank-2, .rank-3 { color: var(--tier-a); }

.order-id {
  font-size: 11px;
  color: var(--text-tertiary);
  font-weight: 500;
  font-variant-numeric: tabular-nums;
}

.customer-name {
  font-weight: 600;
  color: var(--text-primary);
  font-size: 13px;
}

.vehicle-info {
  color: var(--text-secondary);
  font-size: 11px;
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
}

.route {
  color: var(--text-secondary);
  font-size: 12px;
  max-width: 240px;
}

.route-arrow { color: var(--text-tertiary); margin: 0 4px; }

/* ── Badges & Tags ───────────────────────────────────────────── */
.state-tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 6px;
  letter-spacing: 0.04em;
}

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: var(--radius-full);
  white-space: nowrap;
  cursor: default;
}

.status-new      { background: var(--blue-bg); color: var(--blue); }
.status-fresh    { color: var(--text-tertiary); }
.status-returning{ background: var(--bg-tertiary); color: var(--text-tertiary); }
.status-aging    { background: var(--orange-bg); color: var(--orange); }
.status-stale    { background: rgba(249,115,22,0.12); color: #f97316; animation: pulse-stale 2s infinite; }
.status-critical { background: var(--red-bg); color: var(--red); animation: pulse-stale 1s infinite; }

.tier-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: var(--radius-full);
  letter-spacing: 0.04em;
}

.tier-A { background: var(--tier-a-bg); color: var(--tier-a); }
.tier-B { background: var(--tier-b-bg); color: var(--tier-b); }
.tier-C { background: var(--tier-c-bg); color: var(--tier-c); }
.tier-D { background: var(--tier-d-bg); color: var(--tier-d); }

.tag {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  padding: 3px 7px;
  margin-right: 3px;
  border-radius: 5px;
  letter-spacing: 0.03em;
}

.tag-port    { background: rgba(249,115,22,0.1); color: #f97316; }
.tag-prepaid { background: var(--green-bg); color: var(--green); }
.tag-enclosed { background: rgba(139,92,246,0.1); color: #8b5cf6; }
.tag-nonrun { background: var(--red-bg); color: var(--red); }
.tag-urgent { background: var(--orange-bg); color: var(--orange); }

.lane-hot  { background: var(--green-bg); color: var(--green); }
.lane-warm { background: var(--orange-bg); color: var(--orange); }
.lane-cool { background: var(--bg-tertiary); color: var(--text-tertiary); }
.lane-cold { background: var(--red-bg); color: var(--red); }

.vsize-high { background: var(--green-bg); color: var(--green); }
.vsize-med  { background: var(--blue-bg); color: var(--blue); }
.vsize-low  { background: var(--orange-bg); color: var(--orange); }
.vsize-spec { background: var(--red-bg); color: var(--red); }

.snow-none { background: var(--green-bg); color: var(--green); }
.snow-low  { background: var(--orange-bg); color: var(--orange); }
.snow-med  { background: rgba(249,115,22,0.1); color: #f97316; }
.snow-high { background: var(--red-bg); color: var(--red); }

/* ── Fees ─────────────────────────────────────────────────────── */
.broker-fee {
  font-weight: 700;
  font-size: 14px;
  color: var(--green);
  font-variant-numeric: tabular-nums;
}

.total-fee {
  font-size: 12px;
  color: var(--text-tertiary);
  font-variant-numeric: tabular-nums;
}

.pickup-date {
  font-size: 12px;
  color: var(--text-secondary);
  font-variant-numeric: tabular-nums;
}

.pickup-urgent { color: var(--orange); font-weight: 700; }

/* ── Score Bar ────────────────────────────────────────────────── */
.score-bar-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 130px;
}

.score-bar-bg {
  flex: 1;
  height: 6px;
  background: var(--bg-tertiary);
  border-radius: var(--radius-full);
  overflow: hidden;
}

.score-bar-fill {
  height: 100%;
  background: var(--gradient-primary);
  border-radius: var(--radius-full);
  transition: width 0.5s ease;
}

.score-num {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-secondary);
  width: 30px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

/* ── Sync Panel ──────────────────────────────────────────────── */
#syncPanel {
  background: var(--bg-primary);
  border: 1px solid var(--border-primary);
  border-radius: var(--radius-xl);
  padding: 20px 24px;
  box-shadow: var(--shadow-sm);
  transition: background 0.3s, border-color 0.3s;
}

.sync-row {
  display: flex;
  gap: 12px;
  align-items: stretch;
  flex-wrap: wrap;
}

.sync-item {
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-primary);
  border-radius: var(--radius-lg);
  padding: 14px 18px;
  flex: 1;
  min-width: 200px;
  transition: all 0.2s;
}

.sync-item:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }

<script>
// ══════════════════════════════════════════════════════════════════════════════
//  THEME TOGGLE
// ══════════════════════════════════════════════════════════════════════════════
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  document.getElementById('themeToggle').textContent = next === 'dark' ? '☀️' : '🌙';
  try { localStorage.setItem('dw_theme', next); } catch(e) {}
}

// Restore saved theme
(function() {
  try {
    const saved = localStorage.getItem('dw_theme');
    if (saved === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      document.getElementById('themeToggle').textContent = '☀️';
    }
  } catch(e) {}
})();

// ══════════════════════════════════════════════════════════════════════════════
//  MEMORY / SYNC ENGINE
// ══════════════════════════════════════════════════════════════════════════════
const MEMORY_KEY = 'ut123_dispatch_memory';
const MAX_SESSIONS = 50;
const AGE_FRESH   = 120;
const AGE_AGING   = 240;
const AGE_STALE   = 360;
const AGE_CRITICAL= 360;

function loadMemory() {
  try { const raw = localStorage.getItem(MEMORY_KEY); return raw ? JSON.parse(raw) : { sessions: [] }; }
  catch(e) { return { sessions: [] }; }
}
function saveMemory(mem) { try { localStorage.setItem(MEMORY_KEY, JSON.stringify(mem)); } catch(e) {} }
function clearMemory() { localStorage.removeItem(MEMORY_KEY); }

function snapshotOrder(o) {
  return { orderId:o.orderId, customer:o.customer, vehicle:o.vehicle, originState:o.originState, destState:o.destState, broker:o.broker, total:o.total, pickupDate:o.pickupDate, score:o.score, rank:o.rank, tier:o.tier, prepaid:o.prepaid, isPort:o.isPort };
}

function syncWithMemory(currentOrders) {
  const mem = loadMemory();
  const now = Date.now();
  const currentIds = new Set(currentOrders.map(o => o.orderId));
  const firstSeenMap = {}, lastSeenMap = {}, lastRankMap = {}, lastScoreMap = {};

  mem.sessions.forEach(session => {
    session.orders.forEach(snap => {
      if (!firstSeenMap[snap.orderId]) firstSeenMap[snap.orderId] = session.timestamp;
      lastSeenMap[snap.orderId] = session.timestamp;
      lastRankMap[snap.orderId] = snap.rank;
      lastScoreMap[snap.orderId] = snap.score;
    });
  });

  currentOrders.forEach(o => {
    const firstSeen = firstSeenMap[o.orderId];
    if (!firstSeen) {
      o.memStatus='new'; o.firstSeen=now; o.ageMinutes=0; o.prevRank=null; o.prevScore=null;
    } else {
      o.firstSeen=firstSeen; o.lastSeen=lastSeenMap[o.orderId];
      o.ageMinutes=Math.floor((now-firstSeen)/60000);
      o.prevRank=lastRankMap[o.orderId]||null; o.prevScore=lastScoreMap[o.orderId]||null;
      if (o.ageMinutes>=AGE_CRITICAL) o.memStatus='critical';
      else if (o.ageMinutes>=AGE_STALE) o.memStatus='stale';
      else if (o.ageMinutes>=AGE_FRESH) o.memStatus='aging';
      else o.memStatus='returning';
    }
  });

  let dispatchedOrders = [];
  if (mem.sessions.length > 0) {
    const lastSession = mem.sessions[mem.sessions.length-1];
    lastSession.orders.forEach(snap => {
      if (!currentIds.has(snap.orderId)) {
        dispatchedOrders.push({...snap, memStatus:'dispatched', dispatchedAt:now, lastSeenAt:lastSession.timestamp, minutesAgo:Math.floor((now-lastSession.timestamp)/60000)});
      }
    });
  }

  mem.sessions.push({ timestamp:now, orders:currentOrders.map(snapshotOrder) });
  if (mem.sessions.length > MAX_SESSIONS) mem.sessions = mem.sessions.slice(mem.sessions.length-MAX_SESSIONS);
  saveMemory(mem);
  return { enrichedOrders:currentOrders, dispatchedOrders };
}

function ageBonus(o) {
  if (!o.ageMinutes) return 0;
  if (o.ageMinutes>=AGE_CRITICAL) return 15;
  if (o.ageMinutes>=AGE_STALE) return 10;
  if (o.ageMinutes>=AGE_FRESH) return 5;
  return 0;
}

function formatAge(minutes) {
  if (minutes<1) return 'just now';
  if (minutes<60) return minutes+'m ago';
  const h=Math.floor(minutes/60), m=minutes%60;
  return m>0 ? h+'h '+m+'m' : h+'h ago';
}

// ── REGION MAP FOR LANE SCORING
const REGION = {
  NY:'NE',NJ:'NE',CT:'NE',MA:'NE',RI:'NE',NH:'NE',VT:'NE',ME:'NE',PA:'NE',DE:'NE',MD:'NE',
  FL:'SE',GA:'SE',SC:'SE',NC:'SE',VA:'SE',
  OH:'MW',IN:'MW',IL:'MW',MI:'MW',WI:'MW',MN:'MW',IA:'MW',MO:'MW',KS:'MW',NE:'MW',ND:'MW',SD:'MW',
  TX:'TX',LA:'TX',AR:'TX',MS:'TX',AL:'TX',TN:'TX',KY:'TX',WV:'TX',
  CO:'MT',WY:'MT',MT:'MT',ID:'MT',UT:'MT',AZ:'MT',NM:'MT',
  CA:'WC',OR:'WC',WA:'WC',NV:'WC',
};

const LANE_STRENGTH = {
  'SE-NE':20,'NE-SE':20,'WC-TX':18,'TX-WC':18,'WC-SE':17,'SE-WC':17,
  'WC-NE':16,'NE-WC':16,'WC-MW':15,'MW-WC':15,'TX-SE':15,'SE-TX':15,
  'TX-NE':14,'NE-TX':14,'TX-MW':13,'MW-TX':13,'SE-MW':13,'MW-SE':13,
  'NE-MW':12,'MW-NE':12,'WC-MT':11,'MT-WC':11,'TX-MT':10,'MT-TX':10,
  'SE-MT':9,'MT-SE':9,'NE-MT':8,'MT-NE':8,'MW-MT':8,'MT-MW':8,
};
const DEFAULT_LANE = 5;
const SAME_STATE_LANE = 2;

const VEHICLE_SIZE_SCORE = {
  'Car':15,'SUV':14,'Pickup':13,'Motorcycle':10,'Van':9,'ATV':7,'Other':6,'Truck':4,'Bus':3,'Heavy':2
};
const VEHICLE_SIZE_LABEL = {
  'Car':'Standard','SUV':'SUV/CUV','Pickup':'Pickup','Motorcycle':'Moto',
  'Van':'Van','ATV':'ATV/UTV','Other':'Other','Truck':'Box Truck','Bus':'Bus','Heavy':'Heavy Equip'
};

function getVehicleCategory(type, vehicle) {
  const t=(type||'').toLowerCase(), v=(vehicle||'').toLowerCase();
  if(t==='car') return 'Car'; if(t==='suv') return 'SUV'; if(t==='pickup') return 'Pickup';
  if(t==='motorcycle') return 'Motorcycle'; if(t==='van') return 'Van'; if(t==='atv') return 'ATV';
  if(t==='other') {
    if(v.includes('bus')||v.includes('school bus')) return 'Bus';
    if(v.includes('box truck')||v.includes('t7500')||v.includes('semi')) return 'Truck';
    if(v.includes('stump')||v.includes('grinder')||v.includes('excavat')||v.includes('dozer')) return 'Heavy';
    if(v.includes('utility')||v.includes('cushman')||v.includes('taylor dunn')) return 'ATV';
    return 'Other';
  }
  return 'Other';
}

function getLaneScore(originState, destState) {
  if(!originState||!destState) return DEFAULT_LANE;
  if(originState===destState) return SAME_STATE_LANE;
  const ro=REGION[originState], rd=REGION[destState];
  if(!ro||!rd) return DEFAULT_LANE;
  if(ro===rd) return 6;
  return LANE_STRENGTH[ro+'-'+rd] ?? DEFAULT_LANE;
}

const SNOW_RISK = {
  FL:0,HI:0,AK:0,TX:1,AZ:1,NM:1,LA:1,MS:1,AL:1,GA:1,SC:1,NC:1,AR:1,CA:1,NV:1,
  TN:2,VA:2,WV:2,MO:2,KS:2,OK:2,OR:2,WA:2,UT:2,
  CO:3,WY:3,MT:3,ID:3,MI:3,NY:3,NJ:3,MA:3,OH:3,IN:3,IL:3,WI:3,MN:3,ND:3,SD:3,NE:3,IA:3,PA:3,ME:3,VT:3,NH:3,CT:3,RI:3,DE:3,MD:3,KY:2,
};
const SNOW_LABEL = ['Clear','Low','Med','High'];
const SNOW_CLASS = ['snow-none','snow-low','snow-med','snow-high'];

let allOrders = [];
let dispatchedOrders = [];
let sortCol = 'rank';
let sortDir = 'asc';
let currentFilter = 'all';
let lastSyncDiff = null;

// ── PARSE
function parseOrders(text) {
  const orders = [];
  const blocks = text.split(/(?=\d{7}-AT\b)/);
  blocks.forEach(block => {
    block = block.trim();
    if (!block) return;
    const o = {};
    const idMatch = block.match(/^(\d{7}-AT)/);
    if (!idMatch) return;
    o.orderId = idMatch[1];
    const dateMatch = block.match(/(\d{2}\/\d{2}\/\d{4}\s+\d{2}:\d{2}\s+[ap]m)/i);
    o.createdAt = dateMatch ? dateMatch[1] : '';
    const agentMatch = block.match(/(?:\d{2}:\d{2}\s+[ap]m)\s+([^\n]+?)(?:\s+ext\.\s*\d+)?(?:\s{2,}|\t)/i);
    o.agent = agentMatch ? agentMatch[1].trim() : '';
    const custMatch = block.match(/ext\.\s*\d+\s+([A-Z][a-zA-Z]+\s+[A-Z][a-zA-Z]+)/);
    o.customer = custMatch ? custMatch[1] : '';
    const emailMatch = block.match(/[\w.+-]+@[\w.-]+\.\w+/);
    o.email = emailMatch ? emailMatch[0] : '';
    const typeMatch = block.match(/\(([^)]+)\)/);
    o.vehicleType = typeMatch ? typeMatch[1] : '';
    const vehLineMatch = block.match(/\([^)]+\)\s*\n([^\n]+)/);
    o.vehicle = vehLineMatch ? vehLineMatch[1].trim() : '';
    o.enclosed = /Ship Via:Enclosed/i.test(block);
    o.runs = /Vehicle Runs:Yes/i.test(block);
    const stateMatches = [...block.matchAll(/([A-Z]{2})\s+\d{5}/g)];
    o.originState = stateMatches.length > 0 ? stateMatches[0][1] : '';
    o.destState = stateMatches.length > 1 ? stateMatches[1][1] : '';
    const originCityMatch = block.match(/United States\s*\n([^\n]+)\s*\n([^\n]+?)([A-Z]{2})\s+\d{5}/);
    if (originCityMatch) { o.originCity = originCityMatch[2].trim().replace(/,\s*$/, ''); }
    else { const m = block.match(/([A-Za-z\s]+),?\s+([A-Z]{2})\s+\d{5}United States/); o.originCity = m ? m[1].trim() : o.originState; }
    const allAddressBlocks = [...block.matchAll(/([A-Za-z\s.]+),?\s+([A-Z]{2})\s+(\d{5})United States/g)];
    if (allAddressBlocks.length >= 2) {
      o.originCity = allAddressBlocks[0][1].trim().split(/\s+/).slice(-2).join(' ');
      o.destCity = allAddressBlocks[1][1].trim().split(/\s+/).slice(-2).join(' ');
    } else { o.destCity = o.destState; }
    const pickupMatch = block.match(/(\d{2}\/\d{2}\/\d{4})\s*\n\s*bump date/i);
    o.pickupDate = pickupMatch ? pickupMatch[1] : '';
    if (o.pickupDate) { const [m2,d2,y2] = o.pickupDate.split('/'); o.pickupDateObj = new Date(y2, m2-1, d2); }
    else { o.pickupDateObj = null; }
    const totalMatch = block.match(/Total:\$([0-9,]+)/);
    const brokerMatch = block.match(/Broker:\$([0-9,]+)/);
    const carrierMatch = block.match(/Carrier:\$([0-9,]+)/);
    o.total = totalMatch ? parseInt(totalMatch[1].replace(',','')) : 0;
    o.broker = brokerMatch ? parseInt(brokerMatch[1].replace(',','')) : 0;
    o.carrier = carrierMatch ? parseInt(carrierMatch[1].replace(',','')) : 0;
    o.prepaid = /Shipper Pre-payment To Broker/i.test(block);
    orders.push(o);
  });
  return orders;
}

// ── PORT DETECTION
const PORT_CITIES = ['long beach','lonng beach','long bch','lbca'];
function isPortOrder(o) {
  if (o.originState !== 'CA') return false;
  const city = (o.originCity || '').toLowerCase();
  const addr = (o.originAddr || '').toLowerCase();
  return PORT_CITIES.some(p => city.includes(p) || addr.includes(p)) && o.broker > 2000;
}

// ── SCORE
function scoreOrder(o) {
  let score = 0;
  const today = new Date(); today.setHours(0,0,0,0);
  o.isPort = isPortOrder(o);
  if (!o.prepaid && !o.isPort) { score += Math.min(40, (o.broker / 750) * 40); }
  else if (o.isPort) { score += Math.min(40, (Math.min(o.broker, 500) / 750) * 40); o.portCapped = true; }
  const risk = SNOW_RISK[o.originState] ?? 1;
  score += [25, 18, 10, 0][risk];
  if (o.pickupDateObj) {
    const daysOut = Math.floor((o.pickupDateObj - today) / 86400000);
    if (daysOut <= 0) score += 20; else if (daysOut === 1) score += 16;
    else if (daysOut === 2) score += 12; else if (daysOut === 3) score += 8; else if (daysOut <= 5) score += 4;
  }
  o.laneScore = getLaneScore(o.originState, o.destState); score += o.laneScore;
  o.vehicleCategory = getVehicleCategory(o.vehicleType, o.vehicle);
  o.vehicleSizeScore = VEHICLE_SIZE_SCORE[o.vehicleCategory] ?? 6; score += o.vehicleSizeScore;
  if (o.prepaid) score += 6;
  if (o.runs) score += 5;
  if (!o.prepaid && !o.isPort && o.total > 0) {
    const margin = o.broker / o.total;
    if (margin >= 0.5) score += 5; else if (margin >= 0.35) score += 3;
  }
  score += ageBonus(o);
  return Math.round(score);
}

function getTier(score) { if(score>=65) return 'A'; if(score>=50) return 'B'; if(score>=35) return 'C'; return 'D'; }

// ── RENDER
function rankOrders() {
  const text = document.getElementById('orderData').value;
  if (!text.trim()) { alert('Please paste order data first.'); return; }
  const parsed = parseOrders(text);
  if (parsed.length === 0) { alert('Could not parse any orders. Make sure you copied directly from Message Plane CRM Live Orders.'); return; }
  const { enrichedOrders, dispatchedOrders: dispatched } = syncWithMemory(parsed);
  dispatchedOrders = dispatched;
  enrichedOrders.forEach(o => { o.score = scoreOrder(o); o.tier = getTier(o.score); });
  enrichedOrders.sort((a,b) => b.score - a.score);
  enrichedOrders.forEach((o,i) => o.rank = i+1);
  allOrders = enrichedOrders;
  const newCount = allOrders.filter(o=>o.memStatus==='new').length;
  const returningCount = allOrders.filter(o=>['returning','aging','stale','critical'].includes(o.memStatus)).length;
  const staleCritCount = allOrders.filter(o=>['stale','critical'].includes(o.memStatus)).length;
  lastSyncDiff = { newCount, returningCount, staleCritCount, dispatched: dispatched.length };
  document.getElementById('lastRun').textContent = allOrders.length + ' orders \u00B7 ' + new Date().toLocaleTimeString();
  document.getElementById('parseInfo').textContent = allOrders.length + ' orders parsed';
  document.getElementById('exportBtn').style.display = 'inline-block';
  renderSyncPanel(); renderStats(); applyFilter(); renderDispatchedPanel();
  document.getElementById('resultsWrap').style.display = 'block';
  document.getElementById('resultsWrap').scrollIntoView({behavior:'smooth', block:'start'});
}

function renderSyncPanel() {
  const el = document.getElementById('syncPanel');
  if (!el) return;
  if (!lastSyncDiff) { el.style.display = 'none'; return; }
  const { newCount, returningCount, staleCritCount, dispatched } = lastSyncDiff;
  const mem = loadMemory();
  if (mem.sessions.length < 2 && dispatched === 0) {
    el.innerHTML = '<div class="sync-row"><div class="sync-item sync-first"><span class="sync-icon">📡</span><span><strong>Memory active</strong><span class="sync-sub">Paste updated orders again later — the tool will detect what moved and what didn\'t.</span></span><span class="sync-meta">' + newCount + ' saved</span></div></div>';
    el.style.display = 'block'; return;
  }
  let html = '<div class="sync-row">';
  if (dispatched > 0) html += '<div class="sync-item sync-dispatched"><span class="sync-icon">✅</span><div><strong>' + dispatched + ' dispatched</strong><span class="sync-sub">Gone since last run</span></div><span class="sync-meta sync-good">' + dispatched + ' gone</span></div>';
  if (newCount > 0) html += '<div class="sync-item sync-new"><span class="sync-icon">🆕</span><div><strong>' + newCount + ' new</strong><span class="sync-sub">Just appeared</span></div><span class="sync-meta">' + newCount + ' new</span></div>';
  if (staleCritCount > 0) html += '<div class="sync-item sync-stale"><span class="sync-icon">⏰</span><div><strong>' + staleCritCount + ' aging out</strong><span class="sync-sub">On list 4+ hours</span></div><span class="sync-meta sync-warn">' + staleCritCount + ' stale</span></div>';
  if (returningCount > 0 && dispatched === 0 && newCount === 0) html += '<div class="sync-item sync-returning"><span class="sync-icon">🔄</span><div><strong>' + returningCount + ' still active</strong><span class="sync-sub">Continuing from previous run</span></div></div>';
  html += '<button class="sync-clear-btn" onclick="confirmClearMemory()">Clear Memory</button></div>';
  el.innerHTML = html; el.style.display = 'block';
}

function renderDispatchedPanel() {
  const el = document.getElementById('dispatchedPanel');
  if (!el) return;
  if (!dispatchedOrders || dispatchedOrders.length === 0) { el.style.display = 'none'; return; }
  let html = '<div class="dispatched-header" onclick="toggleDispatched()"><span class="dispatched-title">Dispatched This Session</span><span class="dispatched-count">' + dispatchedOrders.length + '</span><span class="dispatched-toggle" id="dispatchedToggle">Show</span></div>';
  html += '<div id="dispatchedBody" style="display:none"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="border-bottom:1px solid var(--border-primary)">';
  ['Order','Customer','Vehicle','Route','Broker $','Was Rank','Removed'].forEach(h => { html += '<th style="padding:10px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.08em">' + h + '</th>'; });
  html += '</tr></thead><tbody>';
  dispatchedOrders.sort((a,b)=>(a.rank||99)-(b.rank||99)).forEach(o => {
    html += '<tr style="border-bottom:1px solid var(--border-secondary)"><td style="padding:10px 14px;font-size:11px;color:var(--text-tertiary)">' + o.orderId + '</td><td style="padding:10px 14px;color:var(--text-secondary)">' + (o.customer||'—') + '</td><td style="padding:10px 14px;color:var(--text-tertiary);font-size:11px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + (o.vehicle||'—') + '</td><td style="padding:10px 14px;font-size:11px;color:var(--text-tertiary)">' + (o.originState||'?') + ' → ' + (o.destState||'?') + '</td><td style="padding:10px 14px;color:var(--green);font-weight:600">$' + (o.broker||0).toLocaleString() + '</td><td style="padding:10px 14px;color:var(--text-tertiary)">#' + (o.rank||'?') + '</td><td style="padding:10px 14px;font-size:11px;color:var(--text-tertiary)">' + formatAge(o.minutesAgo||0) + '</td></tr>';
  });
  html += '</tbody></table></div>';
  el.innerHTML = html; el.style.display = 'block';
}

function toggleDispatched() {
  const body = document.getElementById('dispatchedBody');
  const toggle = document.getElementById('dispatchedToggle');
  if (!body) return;
  const visible = body.style.display !== 'none';
  body.style.display = visible ? 'none' : 'block';
  if (toggle) toggle.textContent = visible ? 'Show' : 'Hide';
}

function confirmClearMemory() {
  if (confirm('Clear all memory? This resets all order history and age tracking.')) {
    clearMemory(); lastSyncDiff = null; dispatchedOrders = [];
    renderSyncPanel(); renderDispatchedPanel();
    allOrders.forEach(o => { o.memStatus = null; o.ageMinutes = 0; });
    applyFilter();
  }
}

function renderStats() {
  const today = new Date(); today.setHours(0,0,0,0);
  const total = allOrders.length;
  const tierA = allOrders.filter(o=>o.tier==='A').length;
  const prepaid = allOrders.filter(o=>o.prepaid).length;
  const totalBroker = allOrders.reduce((s,o)=>s+o.broker,0);
  const urgentToday = allOrders.filter(o=>o.pickupDateObj && Math.floor((o.pickupDateObj-today)/86400000)<=0).length;
  const portCount = allOrders.filter(o=>o.isPort).length;
  document.getElementById('statsBar').innerHTML =
    '<div class="stat-item"><span class="stat-val">' + total + '</span><span class="stat-label">Total Orders</span></div>' +
    '<div class="stat-item"><span class="stat-val" style="color:var(--tier-a)">' + tierA + '</span><span class="stat-label">Tier A</span></div>' +
    '<div class="stat-item"><span class="stat-val" style="color:var(--green)">$' + totalBroker.toLocaleString() + '</span><span class="stat-label">Total Broker</span></div>' +
    '<div class="stat-item"><span class="stat-val" style="color:var(--green)">' + prepaid + '</span><span class="stat-label">Pre-Paid</span></div>' +
    '<div class="stat-item"><span class="stat-val" style="color:var(--orange)">' + urgentToday + '</span><span class="stat-label">Due Today</span></div>' +
    (portCount > 0 ? '<div class="stat-item"><span class="stat-val" style="color:#f97316">' + portCount + '</span><span class="stat-label">Port Orders</span></div>' : '');
}

let activeFilter = 'all';
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function applyFilter() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const today = new Date(); today.setHours(0,0,0,0);
  let filtered = allOrders.filter(o => {
    if (activeFilter==='A' && o.tier!=='A') return false;
    if (activeFilter==='B' && o.tier!=='B') return false;
    if (activeFilter==='C' && o.tier!=='C') return false;
    if (activeFilter==='prepaid' && !o.prepaid) return false;
    if (activeFilter==='stale' && !['stale','critical','aging'].includes(o.memStatus)) return false;
    if (activeFilter==='new' && o.memStatus!=='new') return false;
    if (activeFilter==='urgent') { const d=o.pickupDateObj?Math.floor((o.pickupDateObj-today)/86400000):99; if(d>0) return false; }
    if (search) {
      const hay = (o.orderId+' '+o.customer+' '+o.vehicle+' '+o.originCity+' '+o.destCity+' '+o.originState+' '+o.destState).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
  renderTable(filtered);
}

function laneClass(s) { if(s>=16) return 'lane-hot'; if(s>=11) return 'lane-warm'; if(s>=6) return 'lane-cool'; return 'lane-cold'; }

function laneLabelStr(o) {
  const ro=REGION[o.originState]||'?', rd=REGION[o.destState]||'?';
  const labels={'NE':'NE','SE':'SE','MW':'MW','TX':'S/TX','MT':'MT','WC':'WC'};
  if(o.originState===o.destState) return 'Same State';
  if(ro===rd) return 'Same Region';
  return (labels[ro]||ro)+' → '+(labels[rd]||rd);
}

function vsizeClass(s) { if(s>=13) return 'vsize-high'; if(s>=9) return 'vsize-med'; if(s>=5) return 'vsize-low'; return 'vsize-spec'; }

function renderStatusCell(o) {
  if (!o.memStatus || o.memStatus==='returning') {
    if (o.ageMinutes>0) return '<span class="status-badge status-returning">↺ '+formatAge(o.ageMinutes)+'</span>';
    return '<span class="status-badge status-fresh">—</span>';
  }
  switch(o.memStatus) {
    case 'new': return '<span class="status-badge status-new">NEW</span>';
    case 'aging': return '<span class="status-badge status-aging">'+formatAge(o.ageMinutes)+'</span>';
    case 'stale': return '<span class="status-badge status-stale">'+formatAge(o.ageMinutes)+'</span>';
    case 'critical': return '<span class="status-badge status-critical">'+formatAge(o.ageMinutes)+'</span>';
    default: return '<span class="status-badge status-fresh">—</span>';
  }
}

function renderTable(orders) {
  const today = new Date(); today.setHours(0,0,0,0);
  const maxScore = allOrders.length > 0 ? allOrders[0].score : 100;
  const tbody = document.getElementById('tableBody');
  if (orders.length===0) { tbody.innerHTML=''; document.getElementById('emptyFiltered').style.display='block'; document.getElementById('resultsCount').textContent='0'; return; }
  document.getElementById('emptyFiltered').style.display='none';
  document.getElementById('resultsCount').textContent=orders.length;
  const risk=o=>SNOW_RISK[o.originState]??1;
  const barPct=o=>Math.round((o.score/maxScore)*100);
  const daysUntil=o=>o.pickupDateObj?Math.floor((o.pickupDateObj-today)/86400000):99;
  let html='';
  orders.forEach(o => {
    const d=daysUntil(o), pickupClass=d<=0?'pickup-urgent':'', pickupLabel=d<=0?'\u26A1 '+o.pickupDate:o.pickupDate||'—';
    const isTop=o.rank<=3;
    const tags=[
      o.prepaid?'<span class="tag tag-prepaid">PRE-PAID</span>':'',
      o.isPort?'<span class="tag tag-port">PORT</span>':'',
      o.enclosed?'<span class="tag tag-enclosed">ENCLOSED</span>':'',
      !o.runs?'<span class="tag tag-nonrun">NO RUN</span>':'',
      d<=0?'<span class="tag tag-urgent">TODAY</span>':'',
    ].join('');
    html+='<tr class="'+(isTop?'top-order':'')+'">';
    html+='<td class="rank-cell '+(o.rank<=3?'rank-'+o.rank:'')+'">'+o.rank+'</td>';
    html+='<td>'+renderStatusCell(o)+'</td>';
    html+='<td><span class="tier-badge tier-'+o.tier+'">'+o.tier+'</span></td>';
    html+='<td class="order-id">'+o.orderId+'</td>';
    html+='<td><div class="customer-name">'+(o.customer||'—')+'</div></td>';
    html+='<td><div class="vehicle-info" title="'+o.vehicle+'">'+(o.vehicleType?'['+o.vehicleType+'] ':'')+o.vehicle+'</div></td>';
    html+='<td class="route">'+(o.originCity||'')+' <span class="state-tag '+SNOW_CLASS[risk(o)]+'">'+o.originState+'</span></td>';
    html+='<td><span class="state-tag '+SNOW_CLASS[risk(o)]+'">'+SNOW_LABEL[risk(o)]+'</span></td>';
    html+='<td class="route">'+(o.destCity||'')+' <span style="color:var(--text-tertiary);font-size:10px">'+o.destState+'</span></td>';
    html+='<td><span class="state-tag '+laneClass(o.laneScore)+'">'+laneLabelStr(o)+'</span></td>';
    html+='<td><span class="state-tag '+vsizeClass(o.vehicleSizeScore)+'">'+(VEHICLE_SIZE_LABEL[o.vehicleCategory]||o.vehicleCategory)+'</span></td>';
    html+='<td class="pickup-date '+pickupClass+'">'+pickupLabel+'</td>';
    html+='<td class="broker-fee">';
    if(o.prepaid) html+='<span style="color:var(--text-tertiary);font-size:11px">$'+o.broker.toLocaleString()+' <span title="Fee excluded — prepaid" style="color:var(--accent);cursor:help">\u2298</span></span>';
    else if(o.isPort) html+='<span style="color:var(--text-tertiary);font-size:11px">$'+o.broker.toLocaleString()+' <span title="Port fee capped" style="color:#f97316;cursor:help">\u2693</span></span>';
    else html+='$'+o.broker.toLocaleString();
    html+='</td>';
    html+='<td class="total-fee">$'+o.total.toLocaleString()+'</td>';
    html+='<td>'+(tags||'<span style="color:var(--text-tertiary);font-size:10px">—</span>')+'</td>';
    html+='<td><div class="score-bar-wrap"><div class="score-bar-bg"><div class="score-bar-fill" style="width:'+barPct(o)+'%"></div></div><span class="score-num">'+o.score+'</span></div></td>';
    html+='</tr>';
  });
  tbody.innerHTML=html;
}

function sortBy(col) {
  if(sortCol===col) sortDir=sortDir==='asc'?'desc':'asc';
  else { sortCol=col; sortDir=(col==='rank'||col==='score'||col==='broker')?'desc':'asc'; }
  const map={rank:'rank',broker:'broker',total:'total',score:'score',customer:'customer',vehicle:'vehicle',origin:'originState',destination:'destState',pickup:'pickupDateObj',orderId:'orderId',lane:'laneScore',vehicleSize:'vehicleSizeScore'};
  const field=map[col]||col;
  allOrders.sort((a,b) => {
    let va=a[field],vb=b[field];
    if(va instanceof Date||va===null){va=va?va.getTime():99999999;vb=vb?vb.getTime():99999999;}
    if(typeof va==='string')va=va.toLowerCase();
    if(typeof vb==='string')vb=vb.toLowerCase();
    if(va<vb) return sortDir==='asc'?-1:1;
    if(va>vb) return sortDir==='asc'?1:-1;
    return 0;
  });
  document.querySelectorAll('th').forEach(th=>th.classList.remove('sort-asc','sort-desc'));
  applyFilter();
}

function clearAll() {
  document.getElementById('orderData').value='';
  document.getElementById('resultsWrap').style.display='none';
  document.getElementById('exportBtn').style.display='none';
  document.getElementById('parseInfo').textContent='';
  document.getElementById('lastRun').textContent='No data loaded';
  const sp=document.getElementById('syncPanel'), dp=document.getElementById('dispatchedPanel');
  if(sp) sp.style.display='none'; if(dp) dp.style.display='none';
  allOrders=[]; dispatchedOrders=[]; lastSyncDiff=null;
}

function exportCSV() {
  const cols=['Rank','Tier','Score','OrderID','Customer','Vehicle','VehicleSize','OriginCity','OriginState','SnowRisk','DestCity','DestState','LaneStrength','LaneScore','PickupDate','Broker','Total','PrePaid','Enclosed','VehicleRuns'];
  const rows=allOrders.map(o=>[o.rank,o.tier,o.score,o.orderId,'"'+o.customer+'"','"'+o.vehicle+'"',VEHICLE_SIZE_LABEL[o.vehicleCategory]||o.vehicleCategory,'"'+o.originCity+'"',o.originState,SNOW_LABEL[SNOW_RISK[o.originState]??1],'"'+o.destCity+'"',o.destState,laneLabelStr(o),o.laneScore,o.pickupDate,o.broker,o.total,o.prepaid?'YES':'NO',o.enclosed?'YES':'NO',o.runs?'YES':'NO'].join(','));
  const csv=[cols.join(','),...rows].join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='dispatch-priority-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

document.addEventListener('keydown', e => { if(e.ctrlKey && e.key==='Enter') rankOrders(); });
</script>
</body>
</html>
