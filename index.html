<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚚</text></svg>" />
  <title>Dispatch Wizard AI — CRM Order Ranking</title>
  <meta name="description" content="Smart CRM order ranking and dispatch prioritization tool. Paste your live orders, rank them instantly." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #f4f6fb;
  --card-bg: #ffffff;
  --card-border: #e2e6ef;
  --text: #1a1d2e;
  --text-secondary: #5a6178;
  --text-muted: #8b91a8;
  --accent: #4f46e5;
  --accent-hover: #4338ca;
  --accent-light: #eef2ff;
  --accent-glow: rgba(79, 70, 229, 0.15);
  --green: #10b981;
  --green-bg: #ecfdf5;
  --green-border: #a7f3d0;
  --red: #ef4444;
  --red-bg: #fef2f2;
  --orange: #f59e0b;
  --orange-bg: #fffbeb;
  --radius: 12px;
  --radius-lg: 16px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
}

/* ── Header ─────────────────────────────────────────────── */
.header {
  background: var(--card-bg);
  border-bottom: 1px solid var(--card-border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-sm);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  font-size: 28px;
  line-height: 1;
}

.logo-text {
  font-size: 20px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.5px;
}

.logo-text span {
  color: var(--accent);
}

.header-badge {
  background: var(--accent-light);
  color: var(--accent);
  font-size: 12px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
}

/* ── Main Layout ────────────────────────────────────────── */
.main {
  max-width: 960px;
  margin: 0 auto;
  padding: 32px 20px 80px;
}

.page-title {
  text-align: center;
  margin-bottom: 32px;
}

.page-title h1 {
  font-size: 28px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 6px;
  letter-spacing: -0.5px;
}

.page-title p {
  color: var(--text-secondary);
  font-size: 15px;
}

/* ── Card ───────────────────────────────────────────────── */
.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius-lg);
  padding: 24px;
  box-shadow: var(--shadow-sm);
  margin-bottom: 24px;
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.card-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-title .icon {
  font-size: 18px;
}

/* ── Textarea ───────────────────────────────────────────── */
.order-input {
  width: 100%;
  min-height: 200px;
  border: 2px solid var(--card-border);
  border-radius: var(--radius);
  padding: 16px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
  background: #fafbfd;
  resize: vertical;
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
}

.order-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px var(--accent-glow);
  background: #fff;
}

.order-input::placeholder {
  color: var(--text-muted);
}

/* ── Buttons ────────────────────────────────────────────── */
.btn-row {
  display: flex;
  gap: 12px;
  margin-top: 16px;
  flex-wrap: wrap;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 24px;
  border: none;
  border-radius: var(--radius);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 2px 8px var(--accent-glow);
}

.btn-primary:hover {
  background: var(--accent-hover);
  box-shadow: 0 4px 16px var(--accent-glow);
  transform: translateY(-1px);
}

.btn-primary:active {
  transform: translateY(0);
}

.btn-secondary {
  background: var(--bg);
  color: var(--text-secondary);
  border: 1px solid var(--card-border);
}

.btn-secondary:hover {
  background: var(--card-border);
  color: var(--text);
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

/* ── Results Section ────────────────────────────────────── */
.results-section {
  display: none;
}

.results-section.visible {
  display: block;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.results-summary {
  display: flex;
  gap: 16px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.stat-box {
  flex: 1;
  min-width: 140px;
  background: var(--bg);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
}

.stat-value {
  font-size: 24px;
  font-weight: 800;
  color: var(--accent);
}

.stat-label {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 2px;
}

/* ── Order List ─────────────────────────────────────────── */
.order-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.order-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  background: var(--bg);
  border-radius: var(--radius);
  border-left: 4px solid transparent;
  transition: all 0.2s;
}

.order-item:hover {
  background: #eef0f7;
}

.order-item.priority-high {
  border-left-color: var(--red);
  background: var(--red-bg);
}

.order-item.priority-medium {
  border-left-color: var(--orange);
  background: var(--orange-bg);
}

.order-item.priority-low {
  border-left-color: var(--green);
  background: var(--green-bg);
}

.order-rank {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  flex-shrink: 0;
}

.order-item.priority-high .order-rank { background: var(--red); }
.order-item.priority-medium .order-rank { background: var(--orange); }
.order-item.priority-low .order-rank { background: var(--green); }

.order-details {
  flex: 1;
  min-width: 0;
}

.order-name {
  font-weight: 600;
  font-size: 14px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.order-meta {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
}

.order-priority-tag {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  flex-shrink: 0;
}

.order-item.priority-high .order-priority-tag {
  background: var(--red);
  color: #fff;
}

.order-item.priority-medium .order-priority-tag {
  background: var(--orange);
  color: #fff;
}

.order-item.priority-low .order-priority-tag {
  background: var(--green);
  color: #fff;
}

/* ── Loading ────────────────────────────────────────────── */
.loading-spinner {
  display: none;
  text-align: center;
  padding: 32px;
}

.loading-spinner.visible {
  display: block;
}

.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--card-border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loading-text {
  font-size: 14px;
  color: var(--text-muted);
}

/* ── Footer ─────────────────────────────────────────────── */
.footer {
  text-align: center;
  padding: 24px;
  color: var(--text-muted);
  font-size: 13px;
}

.footer strong {
  color: var(--text-secondary);
}

/* ── Responsive ─────────────────────────────────────────── */
@media (max-width: 640px) {
  .header {
    padding: 12px 16px;
  }

  .logo-text {
    font-size: 17px;
  }

  .main {
    padding: 20px 16px 60px;
  }

  .page-title h1 {
    font-size: 22px;
  }

  .card {
    padding: 18px;
  }

  .order-input {
    min-height: 160px;
    font-size: 13px;
  }

  .btn-row {
    flex-direction: column;
  }

  .btn {
    justify-content: center;
  }

  .results-summary {
    gap: 10px;
  }

  .stat-box {
    min-width: 100px;
    padding: 12px;
  }

  .stat-value {
    font-size: 20px;
  }

  .order-item {
    padding: 12px;
    gap: 10px;
  }
}
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <span class="logo-icon">🚚</span>
      <span class="logo-text">Dispatch<span>Wizard</span> AI</span>
    </div>
    <span class="header-badge">Built for UT123</span>
  </header>

  <!-- Main Content -->
  <main class="main">
    <div class="page-title">
      <h1>CRM Order Ranking</h1>
      <p>Paste your live orders below and rank them by priority instantly</p>
    </div>

    <!-- Input Card -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">
          <span class="icon">📋</span>
          Paste Live Orders from CRM
        </div>
      </div>
      <textarea id="orderInput" class="order-input" placeholder="Paste your CRM orders here...

Example format:
ORD-1001 | Acme Corp | $12,500 | Due: Mar 3 | New
ORD-1002 | GlobalTech | $8,200 | Due: Mar 1 | Rush
ORD-1003 | Smith & Co | $3,400 | Due: Mar 7 | Standard
ORD-1004 | Vertex LLC | $24,000 | Due: Feb 28 | Urgent

Or paste any text — orders will be parsed automatically."></textarea>
      <div class="btn-row">
        <button id="rankBtn" class="btn btn-primary" onclick="rankOrders()">
          <span>⚡</span> Rank Orders
        </button>
        <button class="btn btn-secondary" onclick="clearAll()">
          Clear
        </button>
        <button class="btn btn-secondary" onclick="loadSample()">
          Load Sample
        </button>
      </div>
    </div>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="loading-spinner">
      <div class="spinner"></div>
      <div class="loading-text">Analyzing and ranking orders...</div>
    </div>

    <!-- Results -->
    <div id="resultsSection" class="results-section">
      <div class="card">
        <div class="card-header">
          <div class="card-title">
            <span class="icon">📊</span>
            Ranked Results
          </div>
          <button class="btn btn-secondary" onclick="copyResults()" style="padding: 8px 14px; font-size: 13px;">
            📋 Copy
          </button>
        </div>

        <div id="resultsSummary" class="results-summary"></div>
        <div id="orderList" class="order-list"></div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    🚚 <strong>Dispatch Wizard AI</strong> — Smart CRM order prioritization
  </footer>

  <script>
(function () {
  'use strict';

  var PRIORITY_KEYWORDS = {
    high: ['urgent', 'rush', 'asap', 'critical', 'emergency', 'hot', 'priority', 'expedite', 'immediate'],
    medium: ['standard', 'normal', 'new', 'pending', 'open', 'active', 'processing'],
    low: ['low', 'backlog', 'hold', 'deferred', 'later', 'future', 'tentative']
  };

  // Parse the raw text input into structured orders
  function parseOrders(text) {
    var lines = text.split('\n').filter(function (l) { return l.trim().length > 0; });
    var orders = [];

    lines.forEach(function (line, index) {
      var trimmed = line.trim();
      if (!trimmed) return;

      // Try pipe-delimited format: ID | Name | Amount | Due | Status
      var parts = trimmed.split('|').map(function (p) { return p.trim(); });

      var order = {
        raw: trimmed,
        index: index
      };

      if (parts.length >= 3) {
        order.id = parts[0] || 'ORD-' + (index + 1);
        order.name = parts[1] || 'Order ' + (index + 1);
        order.amount = parseAmount(parts[2] || '');
        order.due = parts[3] || '';
        order.status = parts[4] || '';
      } else if (parts.length === 2) {
        order.id = parts[0];
        order.name = parts[1];
        order.amount = parseAmount(parts[1]);
        order.due = '';
        order.status = '';
      } else {
        // Single line — treat the whole thing as order info
        order.id = 'ORD-' + (index + 1);
        order.name = trimmed.substring(0, 60);
        order.amount = parseAmount(trimmed);
        order.due = extractDate(trimmed);
        order.status = '';
      }

      order.priority = detectPriority(trimmed, order);
      order.score = calculateScore(order);
      orders.push(order);
    });

    // Sort by score descending (highest priority first)
    orders.sort(function (a, b) { return b.score - a.score; });

    return orders;
  }

  function parseAmount(str) {
    var match = str.match(/\$[\d,]+(\.\d{2})?/);
    if (match) {
      return parseFloat(match[0].replace(/[$,]/g, ''));
    }
    return 0;
  }

  function extractDate(str) {
    var patterns = [
      /due[:\s]*([A-Za-z]+\s+\d{1,2})/i,
      /(\d{1,2}\/\d{1,2}\/?\d{0,4})/,
      /([A-Za-z]{3}\s+\d{1,2})/
    ];
    for (var i = 0; i < patterns.length; i++) {
      var m = str.match(patterns[i]);
      if (m) return m[1] || m[0];
    }
    return '';
  }

  function detectPriority(text, order) {
    var lower = text.toLowerCase();

    for (var i = 0; i < PRIORITY_KEYWORDS.high.length; i++) {
      if (lower.indexOf(PRIORITY_KEYWORDS.high[i]) !== -1) return 'high';
    }
    for (var j = 0; j < PRIORITY_KEYWORDS.low.length; j++) {
      if (lower.indexOf(PRIORITY_KEYWORDS.low[j]) !== -1) return 'low';
    }

    // High amount = higher priority
    if (order.amount >= 15000) return 'high';
    if (order.amount >= 5000) return 'medium';

    return 'medium';
  }

  function calculateScore(order) {
    var score = 0;

    // Priority weight
    if (order.priority === 'high') score += 100;
    else if (order.priority === 'medium') score += 50;
    else score += 10;

    // Amount weight (normalized)
    if (order.amount > 0) {
      score += Math.min(order.amount / 500, 50);
    }

    // Due date urgency — sooner = higher score
    if (order.due) {
      var dueLower = order.due.toLowerCase();
      if (dueLower.indexOf('today') !== -1 || dueLower.indexOf('asap') !== -1) {
        score += 40;
      } else if (dueLower.indexOf('tomorrow') !== -1) {
        score += 30;
      } else {
        // Try to parse actual date
        var d = new Date(order.due);
        if (!isNaN(d.getTime())) {
          var daysUntil = (d - new Date()) / (1000 * 60 * 60 * 24);
          if (daysUntil <= 1) score += 40;
          else if (daysUntil <= 3) score += 25;
          else if (daysUntil <= 7) score += 15;
          else score += 5;
        }
      }
    }

    return Math.round(score);
  }

  // Render results to the DOM
  function renderResults(orders) {
    var resultsSection = document.getElementById('resultsSection');
    var summaryEl = document.getElementById('resultsSummary');
    var listEl = document.getElementById('orderList');

    // Count priorities
    var counts = { high: 0, medium: 0, low: 0 };
    var totalValue = 0;
    orders.forEach(function (o) {
      counts[o.priority]++;
      totalValue += o.amount;
    });

    // Summary
    summaryEl.innerHTML =
      '<div class="stat-box"><div class="stat-value">' + orders.length + '</div><div class="stat-label">Total Orders</div></div>' +
      '<div class="stat-box"><div class="stat-value" style="color:var(--red)">' + counts.high + '</div><div class="stat-label">High Priority</div></div>' +
      '<div class="stat-box"><div class="stat-value" style="color:var(--orange)">' + counts.medium + '</div><div class="stat-label">Medium</div></div>' +
      '<div class="stat-box"><div class="stat-value" style="color:var(--green)">' + counts.low + '</div><div class="stat-label">Low</div></div>' +
      (totalValue > 0 ? '<div class="stat-box"><div class="stat-value">$' + totalValue.toLocaleString() + '</div><div class="stat-label">Total Value</div></div>' : '');

    // Order list
    listEl.innerHTML = '';
    orders.forEach(function (order, i) {
      var item = document.createElement('div');
      item.className = 'order-item priority-' + order.priority;
      item.innerHTML =
        '<div class="order-rank">' + (i + 1) + '</div>' +
        '<div class="order-details">' +
          '<div class="order-name">' + escapeHtml(order.id + (order.name && order.name !== order.id ? ' — ' + order.name : '')) + '</div>' +
          '<div class="order-meta">' +
            (order.amount > 0 ? '$' + order.amount.toLocaleString() : '') +
            (order.due ? (order.amount > 0 ? ' · ' : '') + 'Due: ' + escapeHtml(order.due) : '') +
            (order.status ? ' · ' + escapeHtml(order.status) : '') +
            ' · Score: ' + order.score +
          '</div>' +
        '</div>' +
        '<span class="order-priority-tag">' + order.priority + '</span>';
      listEl.appendChild(item);
    });

    resultsSection.classList.add('visible');
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ── Public API ──────────────────────────────────────────────

  window.rankOrders = function () {
    var input = document.getElementById('orderInput').value.trim();
    if (!input) {
      alert('Please paste your CRM orders first.');
      return;
    }

    var resultsSection = document.getElementById('resultsSection');
    var loadingSpinner = document.getElementById('loadingSpinner');

    resultsSection.classList.remove('visible');
    loadingSpinner.classList.add('visible');

    // Simulate brief processing time for UX
    setTimeout(function () {
      var orders = parseOrders(input);
      loadingSpinner.classList.remove('visible');

      if (orders.length === 0) {
        alert('Could not parse any orders. Try a different format.');
        return;
      }

      renderResults(orders);

      // Scroll to results
      resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 600);
  };

  window.clearAll = function () {
    document.getElementById('orderInput').value = '';
    document.getElementById('resultsSection').classList.remove('visible');
    document.getElementById('loadingSpinner').classList.remove('visible');
  };

  window.loadSample = function () {
    document.getElementById('orderInput').value =
      'ORD-4401 | Vertex Industries | $24,000 | Due: Mar 1 | Urgent\n' +
      'ORD-4402 | Pinnacle Group | $18,750 | Due: Mar 3 | Rush\n' +
      'ORD-4403 | Summit Healthcare | $9,200 | Due: Mar 5 | Standard\n' +
      'ORD-4404 | Redline Logistics | $6,800 | Due: Mar 2 | Priority\n' +
      'ORD-4405 | Atlas Manufacturing | $31,500 | Due: Feb 28 | Critical\n' +
      'ORD-4406 | Coastline Retail | $4,100 | Due: Mar 10 | Standard\n' +
      'ORD-4407 | Bridgeport LLC | $2,250 | Due: Mar 12 | Low\n' +
      'ORD-4408 | NovaTech Solutions | $15,600 | Due: Mar 4 | New\n' +
      'ORD-4409 | Greenfield Farms | $1,800 | Due: Mar 15 | Backlog\n' +
      'ORD-4410 | Metro Services Inc | $11,300 | Due: Mar 1 | ASAP';
    document.getElementById('resultsSection').classList.remove('visible');
  };

  window.copyResults = function () {
    var listEl = document.getElementById('orderList');
    var items = listEl.querySelectorAll('.order-item');
    var text = 'RANKED ORDERS\n' + '='.repeat(40) + '\n\n';

    items.forEach(function (item, i) {
      var name = item.querySelector('.order-name').textContent;
      var meta = item.querySelector('.order-meta').textContent;
      var tag = item.querySelector('.order-priority-tag').textContent;
      text += '#' + (i + 1) + ' [' + tag.toUpperCase() + '] ' + name + '\n   ' + meta + '\n\n';
    });

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text);
    } else {
      var ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }

    var btn = event.target.closest('.btn');
    if (btn) {
      var orig = btn.innerHTML;
      btn.innerHTML = '✓ Copied';
      setTimeout(function () { btn.innerHTML = orig; }, 1500);
    }
  };

  // Allow Ctrl/Cmd+Enter to rank
  document.getElementById('orderInput').addEventListener('keydown', function (e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      window.rankOrders();
    }
  });

})();
  </script>
</body>
</html>
